<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Photobooth – Haleon Partners Club</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* ─── Main Kiosk Container ─── */
        .kiosk-container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0 auto;
        }

        /* ─── Background image fills the container ─── */
        .bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Header ─── */
        .site-header {
            position: relative;
            z-index: 10;
            width: 100%;
            flex-shrink: 0;
        }
        .site-header img {
            width: 100%;
            display: block;
        }

        /* ─── Scrollable content area ─── */
        .content-area {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* ─── Footer ─── */
        .site-footer {
            position: relative;
            z-index: 10;
            width: 100%;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .site-footer img {
            width: 100%;
            display: block;
        }

        /* ─── Screens ─── */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            padding: 4vh 4vw;
            animation: fadeIn 0.4s ease-in-out;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Camera graphic / hero icon ─── */
        .hero-graphic {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin: 16px auto 12px;
            filter: drop-shadow(0 0 28px rgba(0, 255, 100, 0.45));
            display: block;
        }

        /* ─── Title ─── */
        h1.title {
            font-size: clamp(32px, 6vh, 64px);
            font-weight: 800;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 1.5vh;
        }

        .subtitle {
            font-size: clamp(16px, 2.5vh, 28px);
            font-weight: 400;
            text-align: center;
            color: rgba(255,255,255,0.75);
            margin-bottom: 1vh;
        }

        .point-badge {
            font-size: clamp(14px, 2vh, 24px);
            font-weight: 700;
            text-align: center;
            color: white;
            margin-bottom: 3vh;
        }

        /* ─── Inputs ─── */
        input {
            width: 100%;
            max-width: 80vw;
            padding: 2vh 2vw;
            font-size: clamp(16px, 2.5vh, 26px);
            font-family: 'Poppins', sans-serif;
            border-radius: 14px;
            border: 1.5px solid rgba(255,255,255,0.2);
            background: rgba(255, 255, 255, 0.07);
            color: white;
            text-align: center;
            margin-bottom: 2vh;
            outline: none;
            backdrop-filter: blur(6px);
        }
        input::placeholder { color: rgba(255,255,255,0.5); }

        /* ─── Primary Button ─── */
        .btn {
            background: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 2.5vh 4vw;
            border-radius: 14px;
            font-size: clamp(20px, 3vh, 32px);
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            width: 100%;
            max-width: 80vw;
            margin-top: 2vh;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 0 3px rgba(0, 255, 80, 0.55), 0 8px 30px rgba(0, 200, 60, 0.3);
            letter-spacing: 0.5px;
        }
        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 0 0 2px rgba(0, 255, 80, 0.3), 0 4px 16px rgba(0,0,0,0.3);
        }

        #homeBtn {
            padding: 1.5vh 4vw; 
            font-size: clamp(18px, 2.5vh, 28px);
            margin-top: 3vh;
        }

        /* ─── Camera / Result Frame ─── */
        .image-frame {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,220,80,0.2);
            height: clamp(300px, 45vh, 800px);
            aspect-ratio: 9/16;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2vh;
            overflow: hidden;
        }
        video, #resultImg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        /* ─── Loading ─── */
        .loading-graphic {
            font-size: clamp(60px, 10vh, 120px);
            margin: 4vh 0 2vh;
            animation: pulse 1.2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%       { transform: scale(1.1); opacity: 0.7; }
        }
        .loading-text {
            font-size: clamp(20px, 3vh, 32px);
            font-weight: 700;
            text-align: center;
            margin-top: 1vh;
        }

        /* ─── QR Section ─── */
        .qr-section {
            display: none;
            align-items: center;
            justify-content: center;
            margin-top: 14px;
            gap: 20px;
        }
        .qr-section img.qr-img {
            width: 160px;
            height: 160px;
            border: 4px solid white;
            border-radius: 10px;
            background: white;
        }
        .qr-text {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
            max-width: 140px;
            color: white;
        }

        .spacer { flex: 1; }
    </style>
</head>
<body>

<div class="kiosk-container">

    <img class="bg" src="assets/background.png" alt="">

    <div class="site-header">
        <img src="assets/Header.png" alt="Haleon Partners Club">
    </div>

    <div class="content-area">

        <div id="startScreen" class="screen active">
            <img class="hero-graphic" src="assets/Cam.png" alt="Camera">
            <h1 class="title">AI Photo<br>Booth</h1>
            <p class="subtitle">Ready to Capture the Moment?</p>
            <p class="point-badge">Enter your name &amp; snap a photo!</p>
            <input type="text" id="userName" placeholder="Enter your name" required>
            <button class="btn" id="startBtn">Start Photobooth</button>
        </div>

        <div id="cameraScreen" class="screen">
            <p class="subtitle" style="margin-top:8px;">Look at the Camera…</p>
            <div class="image-frame">
                <video id="video" autoplay playsinline></video>
            </div>
            <button class="btn" id="captureBtn">📸 Capture</button>
        </div>

        <div id="loadingScreen" class="screen">
            <div class="spacer"></div>
            <div class="loading-graphic">✨📷✨</div>
            <p class="loading-text">Processing Your Photo…</p>
            <p class="subtitle" style="margin-top:8px;">Please wait a moment</p>
            <div class="spacer"></div>
        </div>

        <div id="resultScreen" class="screen">
            <p class="subtitle" id="resultSubtitle" style="margin-top:8px;">Your Artwork is Ready! 🎉</p>
            <div class="image-frame">
                <img id="resultImg" alt="Your AI photo" />
            </div>
            <div class="qr-section" id="qrCodeContainer">
                <img id="qrImg" class="qr-img" alt="QR Code">
                <div class="qr-text" id="qrText">SCAN QR CODE<br>TO DOWNLOAD<br>YOUR PHOTO</div>
            </div>
            <button class="btn" id="homeBtn">🏠 Back to Home</button>
        </div>

    </div>
    
    <div class="site-footer">
        <img src="assets/Footer.png" alt="brought to you by Panadol & Centrum – PM-EG-CNT-26-00007">
    </div>

</div>

<canvas id="canvas" style="display:none;"></canvas>
<img id="frameImg" src="assets/frame.png" style="display:none;">
<img id="footerImg" src="assets/Footer Ai.png" style="display:none;">
<img id="badgeImg" src="assets/Batch.png" style="display:none;"> <script>
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let currentUserName = '';

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    document.getElementById('startBtn').onclick = () => {
        const nameVal = document.getElementById('userName').value.trim();
        if (!nameVal) { alert('Please enter your name first!'); return; }
        currentUserName = nameVal;
        
        showScreen('cameraScreen');
        if (!video.srcObject) {
            navigator.mediaDevices
                .getUserMedia({ video: { facingMode: 'user' } })
                .then(s => video.srcObject = s)
                .catch(() => alert('Please allow camera access to use the photobooth.'));
        }
    };

    document.getElementById('captureBtn').onclick = async () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64Image = canvas.toDataURL('image/jpeg', 0.95);

        showScreen('loadingScreen');

        try {
            const response = await fetch('/process-image', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ image_url: base64Image })
            });
            const data = await response.json();

            if (data.images && data.images.length > 0) {
                const aiImageUrl = data.images[0].url;
                const aiImgObj   = new Image();

                aiImgObj.onload = async () => {
                    const compCanvas = document.createElement('canvas');
                    const ctx        = compCanvas.getContext('2d');
                    const frame      = document.getElementById('frameImg');
                    const footer     = document.getElementById('footerImg');
                    const badge      = document.getElementById('badgeImg'); // Our Badge Layer

                    let drawX = 0, drawY = 0, drawW = aiImgObj.width, drawH = aiImgObj.height;

                    if (frame && frame.naturalWidth > 0) {
                        compCanvas.width  = frame.naturalWidth;
                        compCanvas.height = frame.naturalHeight;
                        ctx.drawImage(frame, 0, 0);
                        drawW = 1080;
                        drawH = 1920;
                        drawX = (compCanvas.width  - drawW) / 2;
                        drawY = (compCanvas.height - drawH) / 2;
                        ctx.drawImage(aiImgObj, drawX, drawY, drawW, drawH);
                    } else {
                        compCanvas.width  = aiImgObj.width;
                        compCanvas.height = aiImgObj.height;
                        ctx.drawImage(aiImgObj, 0, 0);
                    }

                    // --- NEW: Draw the Badge Layer onto the Lab Coat ---
                    if (badge && badge.naturalWidth > 0) {
                        const badgeW = drawW * 0.20; // Size: 20% of the image width
                        const badgeH = (badge.naturalHeight / badge.naturalWidth) * badgeW;
                        
                        // Positioning: Move 66% across to the right, and 64% down from the top 
                        // (You can adjust 0.66 and 0.64 if you need it slightly higher/lower/left/right)
                        const badgeX = drawX + (drawW * 0.66);
                        const badgeY = drawY + (drawH * 0.64);
                        
                        ctx.drawImage(badge, badgeX, badgeY, badgeW, badgeH);
                    }

                    // --- Draw the Footer Layer ---
                    if (footer && footer.naturalWidth > 0) {
                        const footerWidth = compCanvas.width;
                        const footerHeight = (footer.naturalHeight / footer.naturalWidth) * footerWidth; 
                        ctx.drawImage(footer, 0, compCanvas.height - footerHeight, footerWidth, footerHeight);
                    }

                    const finalImageUrl = compCanvas.toDataURL('image/jpeg', 0.95);
                    document.getElementById('resultImg').src = finalImageUrl;
                    showScreen('resultScreen');

                    const qrContainer  = document.getElementById('qrCodeContainer');
                    const qrImgEl      = document.getElementById('qrImg');
                    const qrTextEl     = document.getElementById('qrText');
                    qrContainer.style.display = 'flex';
                    qrImgEl.src  = 'data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==';
                    qrTextEl.innerHTML = 'UPLOADING…<br>PLEASE WAIT';

                    try {
                        const uploadRes  = await fetch('/upload-to-drive', {
                            method:  'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body:    JSON.stringify({ image_url: finalImageUrl, userName: currentUserName })
                        });
                        const uploadData = await uploadRes.json();
                        qrImgEl.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(uploadData.link)}`;
                        qrTextEl.innerHTML = 'SCAN QR CODE<br>TO DOWNLOAD<br>YOUR PHOTO';
                    } catch {
                        qrTextEl.innerHTML = 'UPLOAD FAILED.<br>SEE STAFF.';
                    }
                };

                aiImgObj.src = aiImageUrl;
            }
        } catch (err) {
            console.error(err);
            alert('Something went wrong during processing.');
            showScreen('cameraScreen');
        }
    };

    document.getElementById('homeBtn').onclick = () => {
        document.getElementById('userName').value        = '';
        document.getElementById('qrCodeContainer').style.display = 'none';
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
        }
        showScreen('startScreen');
    };
</script>
</body>
</html>
